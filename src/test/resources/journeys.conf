# Configure here your journeys. A journey is a sequence of requests at a certain load.

journeys {

  nilMonthlyReturn = {
    description = "Monthly nil return"
    load = 0.1
    parts = [
      agent-landing-pages,
      nil-monthly-return
    ]
  }

  agentLanding = {
      description = "Agent landing pages"
      load = 0.1
      parts = [
        agent-landing-pages
    ]
  }

  orgLanding = {
      description = "Organisation landing pages"
      load = 0.1
      parts = [
        org-landing-pages
    ]
  }

    addSoleTraderSubcontractor = {
      description = "Add sole trader subcontractor pages"
      load = 0.1
      parts = [
        org-landing-pages,
        add-sole-trader-subcontractor
      ]
    }

    prepopulationSuccessful = {
          description = "Successful prepopulation"
          load = 0.1
          parts = [
            successful-prepopulation
          ]
        }

    prepopulationUnsuccessful = {
             description = "Unsuccessful prepopulation"
             load = 0.1
             parts = [
               unsuccessful-prepopulation
             ]
           }

    addPartnershipSubcontractor = {
        description = "Add partnership subcontractor pages"
        load = 0.1
        parts = [
          org-landing-pages,
          add-partnership-subcontractor
        ]
    }

  allJourneys = {
      description = "All"
      load = 0.1
      parts = [

      ]
  }

}

# Default behaviour is to run all journeys. If that is not what you need you can specify the list of journeys to run
  journeysToRun = [
