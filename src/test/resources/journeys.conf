# Configure here your journeys. A journey is a sequence of requests at a certain load.

# Note: The total target load (e.g. 1.28 JPS) is distributed across all user journeys in the test.
# For example, if there are 4 journeys, each journey will run at 0.32 JPS (1.28 ÷ 4), ensuring the overall load remains consistent.

journeys {

  nilMonthlyReturn = {
    description = "Nil monthly return pages"
    load = 0.1
    parts = [
      agent-landing-pages,
      nil-monthly-return
    ]
  }

  standardMonthlyReturn = {
      description = "Standard monthly return pages"
      load = 0.1
      parts = [
        org-landing-pages,
        standard-monthly-return
      ]
    }

  agentLanding = {
      description = "Agent landing pages"
      load = 0.1
      parts = [
        agent-landing-pages
    ]
  }

  orgLanding = {
      description = "Organisation landing pages"
      load = 0.1
      parts = [
        org-landing-pages
    ]
  }

    addIndividualSubcontractor = {
      description = "Add individual subcontractor pages"
      load = 0.1
      parts = [
        org-landing-pages,
        add-individual-subcontractor
      ]
    }

    prepopulationSuccessful = {
          description = "Successful prepopulation pages"
          load = 0.1
          parts = [
            successful-prepopulation
          ]
        }

    prepopulationUnsuccessful = {
             description = "Unsuccessful prepopulation pages"
             load = 0.1
             parts = [
               unsuccessful-prepopulation
             ]
           }

    addPartnershipSubcontractor = {
        description = "Add partnership subcontractor pages"
        load = 0.1
        parts = [
          org-landing-pages,
          add-partnership-subcontractor
        ]
    }

  allJourneys = {
      description = "All"
      load = 0.1
      parts = [
            agent-landing-pages,
            nil-monthly-return,
            standard-monthly-return
            org-landing-pages,
            add-partnership-subcontractor,
            unsuccessful-prepopulation,
            agent-landing-pages,
            add-individual-subcontractor
      ]
  }

}

# Default behaviour is to run all journeys. If that is not what you need you can specify the list of journeys to run
  journeysToRun = [
    allJourneys
   ]
# You can specify the same list of journeys via environment variables:
# journeysToRun.0 =nilMonthlyReturn

